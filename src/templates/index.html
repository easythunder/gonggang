<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🕒 곰방 - 공통 빈시간 찾기</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 20px;
        }

        h1 {
            font-size: 2.5em;
            color: #333;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 1.1em;
        }

        /* Screen Management */
        .screen {
            display: none;
        }

        .screen.active {
            display: block;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Welcome Screen */
        .welcome-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin: 40px 0;
        }

        .big-button {
            padding: 40px;
            border: none;
            border-radius: 12px;
            font-size: 1.2em;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            text-align: center;
        }

        .big-button-icon {
            font-size: 3em;
        }

        .btn-create {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-create:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .btn-join {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .btn-join:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(245, 87, 108, 0.4);
        }

        /* Form Styles */
        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
            font-size: 1.05em;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 8px;
            font-size: 1em;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
            font-family: monospace;
        }

        input[type="file"] {
            padding: 10px;
            cursor: pointer;
        }

        .form-hint {
            font-size: 0.85em;
            color: #999;
            margin-top: 5px;
        }

        .info-box {
            background: #f0f4ff;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            color: #333;
        }

        .info-box strong {
            color: #667eea;
        }

        /* Group Setup Form */
        .group-setup {
            background: #f8f9fa;
            padding: 30px;
            border-radius: 12px;
            margin: 20px 0;
        }

        .group-id-display {
            background: white;
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #667eea;
            text-align: center;
            margin: 15px 0;
        }

        .group-id-label {
            color: #999;
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        .group-id-value {
            font-size: 1.4em;
            font-weight: bold;
            color: #667eea;
            font-family: monospace;
            word-break: break-all;
        }

        .copy-btn {
            margin-top: 10px;
            padding: 8px 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
        }

        .copy-btn:hover {
            background: #5568d3;
        }

        .copy-btn.copied {
            background: #4caf50;
        }

        /* Schedule Input */
        .schedule-upload {
            border: 2px dashed #667eea;
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #f8f9fa;
        }

        .schedule-upload:hover {
            background: #f0f4ff;
            border-color: #764ba2;
        }

        .schedule-upload.active {
            background: #e8f5e9;
            border-color: #4caf50;
        }

        .upload-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }

        .schedule-preview {
            margin-top: 20px;
        }

        .preview-image {
            max-width: 100%;
            max-height: 300px;
            border-radius: 8px;
            margin: 10px 0;
        }

        /* Button Styles */
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #e0e0e0;
        }

        .btn-back {
            background: #999;
            color: white;
            margin-right: 10px;
        }

        .btn-back:hover:not(:disabled) {
            background: #777;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .button-group button {
            flex: 1;
            min-width: 150px;
        }

        /* Results Screen */
        .group-info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            border-left: 4px solid #667eea;
        }

        .group-info p {
            margin: 10px 0;
            color: #333;
        }

        .group-name {
            font-weight: bold;
            font-size: 1.3em;
            color: #667eea;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }

        .stat-card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            border: 2px solid #eee;
        }

        .stat-card h3 {
            color: #999;
            font-size: 0.9em;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .stat-card .value {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }

        .section {
            margin-bottom: 40px;
        }

        .section h2 {
            font-size: 1.8em;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        .candidates {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .candidate-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
        }

        .candidate-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .candidate-rank {
            position: absolute;
            top: 10px;
            right: 15px;
            background: rgba(255, 255, 255, 0.3);
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9em;
        }

        .candidate-title {
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 10px;
            margin-top: 5px;
        }

        .candidate-time {
            font-size: 0.95em;
            opacity: 0.9;
            margin-bottom: 10px;
        }

        .candidate-duration {
            font-size: 1.1em;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.2);
            padding: 10px;
            border-radius: 5px;
            text-align: center;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 3em;
            margin-bottom: 20px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
        }

        .spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #c62828;
            margin-bottom: 20px;
        }

        .success {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #2e7d32;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.8em;
            }

            .welcome-buttons {
                grid-template-columns: 1fr;
            }

            .button-group {
                flex-direction: column;
            }

            .button-group button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🕒 곰방</h1>
            <p class="subtitle">공통 빈시간을 찾아보세요</p>
        </header>

        <!-- Welcome Screen -->
        <div id="welcomeScreen" class="screen active">
            <div class="welcome-buttons">
                <button class="big-button btn-create" onclick="app.goToCreateGroup()">
                    <div class="big-button-icon">✨</div>
                    <div>그룹 생성하기</div>
                    <div style="font-size: 0.8em; opacity: 0.9;">새 그룹을 만들고 공강시간을 찾으세요</div>
                </button>
                <button class="big-button btn-join" onclick="app.goToJoinGroup()">
                    <div class="big-button-icon">📥</div>
                    <div>참여하기</div>
                    <div style="font-size: 0.8em; opacity: 0.9;">기존 그룹에 참여하세요</div>
                </button>
            </div>
        </div>

        <!-- Create Group Screen -->
        <div id="createGroupScreen" class="screen">
            <div class="group-setup">
                <h2>새 그룹 만들기</h2>
                
                <div class="form-group">
                    <label>그룹 ID (자동 생성됨)</label>
                    <div class="group-id-display">
                        <div class="group-id-label">생성된 그룹 ID</div>
                        <div class="group-id-value" id="createGroupId">계산 중...</div>
                        <button class="copy-btn" onclick="app.copyGroupId('createGroupId')">복사</button>
                    </div>
                </div>

                <div class="form-group">
                    <label>시간 단위 선택</label>
                    <select id="displayUnit" onchange="app.updateGroupId()">
                        <option value="30">30분 단위</option>
                        <option value="10">10분 단위</option>
                        <option value="15">15분 단위</option>
                        <option value="60">1시간 단위</option>
                    </select>
                    <div class="form-hint">더 작은 단위일수록 더 정밀한 시간 매칭이 가능합니다</div>
                </div>

                <div class="form-group">
                    <label>당신의 시간표 이미지</label>
                    <div class="schedule-upload" id="scheduleUpload" onclick="document.getElementById('scheduleFile').click()">
                        <div class="upload-icon">📅</div>
                        <div>클릭하여 이미지 선택 또는 드래그 앤 드롭</div>
                        <div class="form-hint">PNG, JPG 형식 (800x600px 이상 권장)</div>
                        <input type="file" id="scheduleFile" accept="image/*" style="display: none;" onchange="app.handleScheduleUpload(event, 'createFlow')">
                    </div>
                    <div class="schedule-preview" id="createSchedulePreview"></div>
                </div>

                <div class="info-box">
                    <strong>💡 팁:</strong> 밝고 선명한 이미지를 업로드하면 정확도가 높아집니다.
                </div>

                <div class="button-group">
                    <button class="btn-secondary" onclick="app.goToWelcome()">뒤로가기</button>
                    <button class="btn-primary" id="createSubmitBtn" onclick="app.submitCreateGroup()" disabled>그룹 생성 및 참여</button>
                </div>
            </div>
        </div>

        <!-- Join Group Screen -->
        <div id="joinGroupScreen" class="screen">
            <div class="group-setup">
                <h2>그룹 참여하기</h2>
                
                <div class="form-group">
                    <label>그룹 ID 입력</label>
                    <input type="text" id="joinGroupId" placeholder="참여할 그룹의 ID를 입력해주세요" onchange="app.validateJoinGroup()">
                    <div class="form-hint">그룹 생성자로부터 그룹 ID를 받아 입력하세요</div>
                </div>

                <div id="joinGroupError" class="error" style="display: none;"></div>
                <div id="joinGroupSuccess" class="success" style="display: none;"></div>

                <div class="form-group" id="joinGroupFormGroup" style="display: none;">
                    <label>당신의 시간표 이미지</label>
                    <div class="schedule-upload" onclick="document.getElementById('joinScheduleFile').click()">
                        <div class="upload-icon">📅</div>
                        <div>클릭하여 이미지 선택 또는 드래그 앤 드롭</div>
                        <div class="form-hint">PNG, JPG 형식 (800x600px 이상 권장)</div>
                        <input type="file" id="joinScheduleFile" accept="image/*" style="display: none;" onchange="app.handleScheduleUpload(event, 'joinFlow')">
                    </div>
                    <div class="schedule-preview" id="joinSchedulePreview"></div>
                </div>

                <div class="button-group">
                    <button class="btn-secondary" onclick="app.goToWelcome()">뒤로가기</button>
                    <button class="btn-primary" id="joinSubmitBtn" onclick="app.submitJoinGroup()" style="display: none;">참여 완료</button>
                </div>
            </div>
        </div>

        <!-- Results Screen -->
        <div id="resultsScreen" class="screen">
            <div id="resultsContent">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>공강시간을 계산하는 중...</p>
                </div>
            </div>

            <div class="button-group" style="margin-top: 30px;">
                <button class="btn-secondary" onclick="app.goToWelcome()">홈으로</button>
                <button class="btn-primary" onclick="location.reload()">새로 시작</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        const app = {
            currentFlow: null,
            groupId: null,
            scheduleFile: null,

            // 화면 전환
            showScreen(screenId) {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.getElementById(screenId).classList.add('active');
                window.scrollTo(0, 0);
            },

            goToWelcome() {
                this.currentFlow = null;
                this.showScreen('welcomeScreen');
            },

            goToCreateGroup() {
                this.currentFlow = 'create';
                this.updateGroupId();
                this.showScreen('createGroupScreen');
            },

            goToJoinGroup() {
                this.currentFlow = 'join';
                document.getElementById('joinGroupId').value = '';
                document.getElementById('joinGroupError').style.display = 'none';
                document.getElementById('joinGroupSuccess').style.display = 'none';
                document.getElementById('joinGroupFormGroup').style.display = 'none';
                this.showScreen('joinGroupScreen');
            },

            // 그룹 ID 생성 (UUID v4)
            generateGroupId() {
                return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function() {
                    const r = Math.random() * 16 | 0;
                    const v = this.charAt(0) === 'x' ? r : (r & 0x3 | 0x8);
                    return v.toString(16);
                });
            },

            updateGroupId() {
                this.groupId = this.generateGroupId();
                document.getElementById('createGroupId').textContent = this.groupId;
            },

            copyGroupId(elementId) {
                const text = document.getElementById(elementId).textContent;
                navigator.clipboard.writeText(text).then(() => {
                    const btn = event.target;
                    btn.textContent = '복사됨!';
                    btn.classList.add('copied');
                    setTimeout(() => {
                        btn.textContent = '복사';
                        btn.classList.remove('copied');
                    }, 2000);
                });
            },

            // 파일 업로드
            handleScheduleUpload(e, flow) {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    this.scheduleFile = file;
                    const previewId = flow === 'create' ? 'createSchedulePreview' : 'joinSchedulePreview';
                    const submitBtn = flow === 'create' ? 'createSubmitBtn' : 'joinSubmitBtn';

                    const preview = document.getElementById(previewId);
                    preview.innerHTML = `
                        <div style="text-align: center;">
                            <img src="${event.target.result}" class="preview-image" alt="Preview">
                            <p style="color: #999; margin-top: 10px;">✅ 이미지가 선택되었습니다</p>
                        </div>
                    `;

                    if (submitBtn) {
                        document.getElementById(submitBtn).disabled = false;
                    }
                };
                reader.readAsDataURL(file);
            },

            // 그룹 생성
            async submitCreateGroup() {
                if (!this.scheduleFile) {
                    alert('이미지를 선택해주세요');
                    return;
                }

                this.showScreen('resultsScreen');
                const resultsContent = document.getElementById('resultsContent');

                try {
                    // 1. 그룹 생성
                    const displayUnit = parseInt(document.getElementById('displayUnit').value);
                    const createRes = await fetch(`${API_BASE}/groups`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ display_unit_minutes: displayUnit })
                    });

                    if (!createRes.ok) throw new Error('그룹 생성 실패');
                    const groupData = await createRes.json();
                    const actualGroupId = groupData.data.group_id;

                    // 2. 이미지 제출
                    const formData = new FormData();
                    formData.append('file', this.scheduleFile);

                    const submitRes = await fetch(`${API_BASE}/groups/${actualGroupId}/submissions`, {
                        method: 'POST',
                        body: formData
                    });

                    if (!submitRes.ok) throw new Error('이미지 제출 실패');

                    // 3. 결과 표시
                    this.showResults(actualGroupId, groupData);

                } catch (error) {
                    resultsContent.innerHTML = `
                        <div class="error">
                            오류가 발생했습니다: ${error.message}
                        </div>
                    `;
                }
            },

            // 그룹 참여 검증
            async validateJoinGroup() {
                const groupId = document.getElementById('joinGroupId').value.trim();
                if (!groupId) return;

                try {
                    const res = await fetch(`${API_BASE}/groups/${groupId}`);
                    const errorDiv = document.getElementById('joinGroupError');
                    const successDiv = document.getElementById('joinGroupSuccess');
                    const formGroup = document.getElementById('joinGroupFormGroup');

                    if (res.ok) {
                        errorDiv.style.display = 'none';
                        successDiv.style.display = 'block';
                        successDiv.innerHTML = '✅ 유효한 그룹입니다. 시간표를 업로드하세요.';
                        formGroup.style.display = 'block';
                    } else {
                        errorDiv.style.display = 'block';
                        errorDiv.innerHTML = '❌ 유효하지 않은 그룹 ID입니다.';
                        successDiv.style.display = 'none';
                        formGroup.style.display = 'none';
                    }
                } catch (error) {
                    console.error('Error:', error);
                }
            },

            // 그룹 참여
            async submitJoinGroup() {
                const groupId = document.getElementById('joinGroupId').value.trim();
                if (!this.scheduleFile) {
                    alert('이미지를 선택해주세요');
                    return;
                }

                this.showScreen('resultsScreen');
                const resultsContent = document.getElementById('resultsContent');

                try {
                    // 이미지 제출
                    const formData = new FormData();
                    formData.append('file', this.scheduleFile);

                    const res = await fetch(`${API_BASE}/groups/${groupId}/submissions`, {
                        method: 'POST',
                        body: formData
                    });

                    if (!res.ok) throw new Error('이미지 제출 실패');

                    // 결과 표시
                    const groupRes = await fetch(`${API_BASE}/groups/${groupId}`);
                    const groupData = await groupRes.json();
                    this.showResults(groupId, groupData);

                } catch (error) {
                    resultsContent.innerHTML = `
                        <div class="error">
                            오류가 발생했습니다: ${error.message}
                        </div>
                    `;
                }
            },

            // 결과 표시
            async showResults(groupId, groupData) {
                try {
                    const res = await fetch(`${API_BASE}/groups/${groupId}/free-time`);
                    if (!res.ok) throw new Error('결과 로드 실패');

                    const data = await res.json();
                    const resultsContent = document.getElementById('resultsContent');

                    let html = this.renderGroupInfo(data.data);
                    html += `<div class="section">
                        <h2>🏆 추천 시간</h2>
                        <div class="candidates">
                            ${this.renderCandidates(data.data.free_time || [])}
                        </div>
                    </div>`;

                    resultsContent.innerHTML = html;
                } catch (error) {
                    console.error('Error:', error);
                }
            },

            renderGroupInfo(data) {
                const groupName = data.group_name || 'N/A';
                const participantCount = data.participant_count || 0;

                return `
                    <div class="group-info">
                        <p class="group-name">그룹: ${groupName}</p>
                        <div class="stats">
                            <div class="stat-card">
                                <h3>참여자</h3>
                                <div class="value">${participantCount}</div>
                            </div>
                        </div>
                    </div>
                `;
            },

            renderCandidates(candidates) {
                if (!candidates || candidates.length === 0) {
                    return '<div class="empty-state"><div class="empty-state-icon">📭</div><p>공통 빈시간이 없습니다</p></div>';
                }

                const DAYS_FULL = {
                    'MONDAY': '월요일',
                    'TUESDAY': '화요일',
                    'WEDNESDAY': '수요일',
                    'THURSDAY': '목요일',
                    'FRIDAY': '금요일',
                    'SATURDAY': '토요일',
                    'SUNDAY': '일요일'
                };

                return candidates.slice(0, 5).map((candidate, idx) => {
                    const startTime = candidate.start ? candidate.start.substring(0, 5) : '';
                    const endTime = candidate.end ? candidate.end.substring(0, 5) : '';
                    const duration = candidate.duration_minutes || 0;
                    const day = DAYS_FULL[candidate.day] || candidate.day;
                    const overlap = candidate.overlap_count || 0;

                    return `
                        <div class="candidate-card">
                            <div class="candidate-rank">#${idx + 1}</div>
                            <div class="candidate-title">${day}</div>
                            <div class="candidate-time">${startTime} ~ ${endTime}</div>
                            <div class="candidate-duration">${duration}분</div>
                        </div>
                    `;
                }).join('');
            }
        };

        // 페이지 로드 시 초기화
        window.addEventListener('load', () => {
            app.showScreen('welcomeScreen');
        });
    </script>
</body>
</html>
