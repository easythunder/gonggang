[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    --cov=src
    --cov-report=html
    --cov-report=term-missing
    --cov-fail-under=85
    -v
    --color=yes
markers =
    unit: Unit tests
    integration: Integration tests
    contract: Contract/API tests
    performance: Performance tests
    security: Security tests
