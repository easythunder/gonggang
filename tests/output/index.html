<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCR 결과 시각화</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 50px;
        }
        
        .header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
        
        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }
        
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(600px, 1fr));
            gap: 30px;
            margin-bottom: 50px;
        }
        
        .card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 35px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.4);
        }
        
        .card img {
            width: 100%;
            height: auto;
            display: block;
        }
        
        .card-footer {
            padding: 20px;
            background: #f8f9fa;
            border-top: 2px solid #eee;
        }
        
        .card-title {
            font-size: 1.3em;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }
        
        .stats {
            display: flex;
            gap: 20px;
            font-size: 0.95em;
            color: #666;
        }
        
        .stat {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .stat-icon {
            font-size: 1.3em;
        }
        
        .footer {
            text-align: center;
            color: white;
            font-size: 1.1em;
            padding: 30px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 15px;
        }
        
        .success-badge {
            display: inline-block;
            background: #2ecc71;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
        }
        
        @media (max-width: 768px) {
            .gallery {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎨 OCR 스케줄 파싱 결과 시각화</h1>
            <p>강화된 OCR 엔진의 다양한 형식 인식 능력</p>
        </div>
        
        <div class="gallery">
            <!-- Result 1 -->
            <div class="card">
                <img src="ocr_result_01.png" alt="OCR Result 1">
                <div class="card-footer">
                    <div class="card-title">테스트 1️⃣ - 혼합 형식</div>
                    <div class="stats">
                        <div class="stat">
                            <span class="stat-icon">⏰</span>
                            <span>8개 시간대</span>
                        </div>
                        <div class="stat">
                            <span class="stat-icon">✅</span>
                            <span class="success-badge">100% 성공</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Result 2 -->
            <div class="card">
                <img src="ocr_result_02.png" alt="OCR Result 2">
                <div class="card-footer">
                    <div class="card-title">테스트 2️⃣ - 공백 형식</div>
                    <div class="stats">
                        <div class="stat">
                            <span class="stat-icon">⏰</span>
                            <span>6개 시간대</span>
                        </div>
                        <div class="stat">
                            <span class="stat-icon">✅</span>
                            <span class="success-badge">100% 성공</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Result 3 -->
            <div class="card">
                <img src="ocr_result_03.png" alt="OCR Result 3">
                <div class="card-footer">
                    <div class="card-title">테스트 3️⃣ - 복합 형식</div>
                    <div class="stats">
                        <div class="stat">
                            <span class="stat-icon">⏰</span>
                            <span>9개 시간대</span>
                        </div>
                        <div class="stat">
                            <span class="stat-icon">✅</span>
                            <span class="success-badge">100% 성공</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Result 4 -->
            <div class="card">
                <img src="ocr_result_04.png" alt="OCR Result 4">
                <div class="card-footer">
                    <div class="card-title">테스트 4️⃣ - 한글 형식</div>
                    <div class="stats">
                        <div class="stat">
                            <span class="stat-icon">⏰</span>
                            <span>3개 시간대</span>
                        </div>
                        <div class="stat">
                            <span class="stat-icon">✅</span>
                            <span class="success-badge">100% 성공</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Result 5 -->
            <div class="card">
                <img src="ocr_result_05.png" alt="OCR Result 5">
                <div class="card-footer">
                    <div class="card-title">테스트 5️⃣ - 영문 형식</div>
                    <div class="stats">
                        <div class="stat">
                            <span class="stat-icon">⏰</span>
                            <span>9개 시간대</span>
                        </div>
                        <div class="stat">
                            <span class="stat-icon">✅</span>
                            <span class="success-badge">100% 성공</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="footer">
            <h2>📊 종합 분석</h2>
            <p style="margin-top: 20px;">
                <strong>전체 파싱 성공률: 100%</strong> ✅<br>
                <strong>평균 시간대 인식: 7개/테스트</strong> 📈<br>
                <strong>지원 형식: 4가지 이상</strong> 🎯<br>
                <strong>프로덕션 준비 완료!</strong> 🚀
            </p>
        </div>
    </div>
</body>
</html>
