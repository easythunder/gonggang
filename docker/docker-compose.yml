version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: gonggang-db
    environment:
      POSTGRES_DB: gonggang
      POSTGRES_USER: gonggang
      POSTGRES_PASSWORD: gonggang_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gonggang"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: gonggang-app
    environment:
      DATABASE_URL: postgresql://gonggang:gonggang_dev_password@postgres:5432/gonggang
      ENVIRONMENT: development
      LOG_LEVEL: DEBUG
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ..:/app
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
