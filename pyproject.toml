[tool.black]
line-length = 100
target-version = ['py311']
exclude = '''
/(
  | migrations
  | \.venv
  | venv
)/
'''

[tool.isort]
profile = "black"
line_length = 100
skip_glob = ["*/migrations/*", "*/venv/*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "--cov=src --cov-report=html --cov-fail-under=85"
